name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.dockerkunja1 }}/myapp:latest .
          docker build -t ${{ secrets.dockerkunja1}}/myapp:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.dckr_pat_QMXW9a4ePrs97FXe3UV1BlNPibw }}/myapp:latest
          docker push ${{ secrets.dckr_pat_QMXW9a4ePrs97FXe3UV1BlNPibw }}/myapp:${{ github.sha }}
